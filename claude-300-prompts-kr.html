<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클로드 프롬프트 300선</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --hermes: #E8521A;
  --hermes-hover: #C94010;
  --hermes-light: #FFF3EE;
  --hermes-mid: rgba(232,82,26,0.12);
  --bg: #F8F6F3;
  --bg-card: #FFFFFF;
  --text-primary: #1A1A18;
  --text-secondary: #5C5C58;
  --text-muted: #9B9B96;
  --border: #E8E6E1;
  --border-hover: #C8C6C0;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 12px;
  --font: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.site-header {
  background: #FFFFFF;
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 1.5rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-mark {
  width: 28px;
  height: 28px;
  background: var(--hermes);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-mark svg { width: 16px; height: 16px; fill: white; }

.logo-text {
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
}

.header-search {
  flex: 1;
  max-width: 420px;
  position: relative;
}

.header-search input {
  width: 100%;
  height: 38px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0 1rem 0 2.5rem;
  font-family: var(--font);
  font-size: 0.875rem;
  background: var(--bg);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.header-search input:focus {
  border-color: var(--hermes);
  box-shadow: 0 0 0 3px rgba(232,82,26,0.1);
}

.header-search input::placeholder { color: var(--text-muted); }

.search-icon {
  position: absolute;
  left: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  width: 15px;
  height: 15px;
  color: var(--text-muted);
  pointer-events: none;
}

.header-count {
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 500;
  flex-shrink: 0;
}

.header-count span { color: var(--hermes); font-weight: 700; }

/* ── Hero ── */
.hero {
  max-width: 1280px;
  margin: 0 auto;
  padding: 4rem 2rem 2.5rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
}

.hero-title {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1.1;
  color: var(--text-primary);
}

.hero-title em {
  font-style: normal;
  color: var(--hermes);
}

.hero-desc {
  margin-top: 0.75rem;
  font-size: 1rem;
  color: var(--text-secondary);
  font-weight: 400;
  max-width: 480px;
}

.hero-badge {
  flex-shrink: 0;
  background: var(--hermes);
  color: white;
  padding: 0.6rem 1.2rem;
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* ── Filters ── */
.filter-bar {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 2rem 2rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  height: 36px;
  padding: 0 1rem;
  border-radius: 100px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: var(--hermes);
  color: var(--hermes);
}

.filter-btn.active {
  background: var(--hermes);
  border-color: var(--hermes);
  color: white;
}

.filter-btn .count {
  font-size: 0.72rem;
  font-weight: 700;
  opacity: 0.7;
}

.filter-btn.active .count { opacity: 0.85; }

/* ── Grid ── */
.prompts-grid {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 2rem 5rem;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1rem;
}

/* ── Card ── */
.prompt-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
}

.prompt-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: transparent;
  transition: background 0.2s;
}

.prompt-card:hover {
  box-shadow: var(--shadow-hover);
  border-color: var(--border-hover);
  transform: translateY(-1px);
}

.prompt-card:hover::before {
  background: var(--hermes);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}

.card-num {
  font-size: 0.72rem;
  font-weight: 800;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
}

.card-cat {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 0.2rem 0.6rem;
  border-radius: 100px;
  background: var(--hermes-mid);
  color: var(--hermes);
  text-transform: uppercase;
}

.card-title {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  line-height: 1.3;
}

.card-content {
  font-size: 0.825rem;
  color: var(--text-secondary);
  line-height: 1.65;
  flex: 1;
}

.card-content mark {
  background: var(--hermes-light);
  color: var(--hermes-hover);
  border-radius: 3px;
  padding: 0 2px;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-top: 0.25rem;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.copy-btn {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  height: 30px;
  padding: 0 0.75rem;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}

.copy-btn:hover {
  border-color: var(--hermes);
  color: var(--hermes);
  background: var(--hermes-light);
}

.copy-btn.copied {
  border-color: #16a34a;
  color: #16a34a;
  background: #f0fdf4;
}

.copy-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(1rem);
  background: var(--text-primary);
  color: white;
  padding: 0.6rem 1.25rem;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 200;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Empty state ── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 5rem 2rem;
  color: var(--text-muted);
}

.empty-state h3 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 0.5rem;
}

/* ── Divider line ── */
.section-divider {
  max-width: 1280px;
  margin: 0 auto 2rem;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  color: var(--text-muted);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Footer ── */
.site-footer {
  text-align: center;
  padding: 2rem;
  color: var(--text-muted);
  font-size: 0.78rem;
  border-top: 1px solid var(--border);
}

.site-footer a { color: var(--hermes); text-decoration: none; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .hero { flex-direction: column; align-items: flex-start; padding: 2.5rem 1.25rem 1.5rem; }
  .header-inner { padding: 0; gap: 0.75rem; }
  .site-header { padding: 0 1.25rem; }
  .filter-bar { padding: 0 1.25rem 1.5rem; }
  .prompts-grid { padding: 0 1.25rem 4rem; grid-template-columns: 1fr; gap: 0.75rem; }
  .header-search { max-width: 100%; }
  .header-count { display: none; }
}
</style>
</head>

  // ── RESEARCH #101-150 ──
  {id:101,ko:"심층 리서치 브리핑",cat:"research",en:"Research [TOPIC] comprehensively. Cover the current state, key players, recent developments, open questions, and what experts disagree about. Structure as a research brief."},
  {id:102,ko:"경쟁사 분석",cat:"research",en:"Analyze [COMPANY/PRODUCT] against its top 5 competitors. Compare on [DIMENSIONS]. Identify where it leads, where it lags, and where the biggest opportunities are."},
  {id:103,ko:"시장 규모 추정",cat:"research",en:"Estimate the market size for [DESCRIBE MARKET]. Use a bottom-up approach, show your assumptions clearly, and give a range rather than a single number."},
  {id:104,ko:"논거 스틸맨닝",cat:"research",en:"Steel-man the argument that [CONTROVERSIAL POSITION]. Present the strongest possible version of this argument as its best advocate would make it. Then identify its weakest points."},
  {id:105,ko:"투자 테제 분석",cat:"research",en:"Analyze the investment thesis for [COMPANY/ASSET]. What has to be true for this to be a good investment, what are the key risks, and what would change your view?"},
  {id:106,ko:"SWOT 분석",cat:"research",en:"Conduct a deep SWOT analysis for [COMPANY/PROJECT/IDEA]. Go beyond surface level observations and identify second-order implications of each factor."},
  {id:107,ko:"제1원칙 분석",cat:"research",en:"Break down [PROBLEM/INDUSTRY/ASSUMPTION] from first principles. What are the irreducible truths, what assumptions are people making that might be wrong, and what does this suggest?"},
  {id:108,ko:"역사적 패턴 분석",cat:"research",en:"Analyze historical examples of [DESCRIBE SITUATION OR PATTERN]. What patterns emerge, what caused success or failure, and what lessons apply to [CURRENT SITUATION]?"},
  {id:109,ko:"데이터 해석",cat:"research",en:"Interpret this data: [PASTE DATA OR DESCRIBE DATASET]. What are the key insights, what is surprising, what questions does it raise, and what decisions does it support?"},
  {id:110,ko:"리스크 분석",cat:"research",en:"Conduct a comprehensive risk analysis for [DESCRIBE PROJECT OR DECISION]. Identify all risks, assess likelihood and impact, prioritize them, and suggest mitigations for the top five."},
  {id:111,ko:"시나리오 계획",cat:"research",en:"Develop three scenarios for [DESCRIBE SITUATION]: a base case, an optimistic case, and a pessimistic case. What would cause each to occur and how should we prepare for each?"},
  {id:112,ko:"문헌 검토",cat:"research",en:"Summarize the current state of research on [TOPIC]. What is well established, what is contested, what are the major schools of thought, and what are the key open questions?"},
  {id:113,ko:"정책 분석",cat:"research",en:"Analyze the policy [DESCRIBE POLICY] from multiple stakeholder perspectives. Who benefits, who is harmed, what are the intended and unintended consequences, and what alternatives exist?"},
  {id:114,ko:"기술 평가",cat:"research",en:"Assess the technology [DESCRIBE TECHNOLOGY] for use in [DESCRIBE CONTEXT]. Evaluate maturity, capabilities, limitations, costs, alternatives, and implementation risks."},
  {id:115,ko:"비즈니스 모델 분석",cat:"research",en:"Analyze the business model of [COMPANY]. How does it make money, what are its unit economics, what drives growth, what are its vulnerabilities, and how defensible is it?"},
  {id:116,ko:"인과 관계 분석",cat:"research",en:"Map the causal chain from [ROOT CAUSE] to [OUTCOME]. What are all the links in the chain, where could intervention have the most impact, and what feedback loops exist?"},
  {id:117,ko:"전문가 의견 종합",cat:"research",en:"You are synthesizing the views of five leading experts on [TOPIC]. Present the areas of consensus, the key disagreements, and what the weight of expert opinion suggests."},
  {id:118,ko:"트렌드 분석",cat:"research",en:"Analyze the trend of [DESCRIBE TREND]. How long has it been building, what is driving it, how durable is it, and what are its second and third order effects?"},
  {id:119,ko:"의사결정 프레임워크",cat:"research",en:"Build a decision framework for [DESCRIBE DECISION TYPE]. What factors matter, how should they be weighted, what information is needed, and what does a good decision process look like?"},
  {id:120,ko:"갭 분석",cat:"research",en:"Conduct a gap analysis between [CURRENT STATE] and [DESIRED STATE] for [DESCRIBE CONTEXT]. What are the gaps, what causes them, and what would close them most efficiently?"},
  {id:121,ko:"근본 원인 분석",cat:"research",en:"Conduct a root cause analysis of [DESCRIBE PROBLEM OR FAILURE]. Use the five whys method, identify contributing factors, and recommend actions that address root causes not symptoms."},
  {id:122,ko:"이해관계자 분석",cat:"research",en:"Map the stakeholders for [DESCRIBE PROJECT OR DECISION]. Who has power, who is affected, what does each party want, and how should each be engaged?"},
  {id:123,ko:"가설 생성",cat:"research",en:"Generate 10 testable hypotheses about [DESCRIBE PHENOMENON OR PROBLEM]. For each, describe what evidence would confirm or refute it and how it could be tested."},
  {id:124,ko:"유추적 추론",cat:"research",en:"Find 5 historical or cross-industry analogies for [DESCRIBE SITUATION]. What can each analogy teach us and where does the analogy break down?"},
  {id:125,ko:"가정 매핑",cat:"research",en:"Map all the assumptions underlying [DESCRIBE PLAN OR BELIEF]. Categorize them by how critical they are and how uncertain they are. Which assumptions most need to be tested?"},
  {id:126,ko:"2차 효과 분석",cat:"research",en:"Analyze the second and third order effects of [DESCRIBE DECISION OR TREND]. Go beyond the obvious first order effects and identify what most people are missing."},
  {id:127,ko:"벤치마크 분석",cat:"research",en:"Benchmark [DESCRIBE SUBJECT] against industry best practices and top performers. Where does it rank, what specifically do the best performers do differently, and what is the improvement path?"},
  {id:128,ko:"고객 리서치 종합",cat:"research",en:"Synthesize these customer interviews and identify the most important patterns: [PASTE INTERVIEW NOTES OR TRANSCRIPTS]. What are the key pain points, desires, and surprising insights?"},
  {id:129,ko:"규제 환경 분석",cat:"research",en:"Analyze the regulatory landscape for [DESCRIBE INDUSTRY OR ACTIVITY] in [GEOGRAPHY]. What regulations apply, what is changing, and what are the compliance risks?"},
  {id:130,ko:"기술 로드맵 분석",cat:"research",en:"Analyze the technology roadmap for [DESCRIBE TECHNOLOGY AREA]. What are the key milestones, what breakthroughs are needed, and what is the realistic timeline for [DESCRIBE CAPABILITY]?"},
  {id:131,ko:"멘탈 모델 적용",cat:"research",en:"Apply the mental model of [DESCRIBE MENTAL MODEL] to analyze [DESCRIBE SITUATION]. What does this lens reveal that a conventional analysis would miss?"},
  {id:132,ko:"사전 검토 분석",cat:"research",en:"Conduct a pre-mortem for [DESCRIBE PLAN]. Imagine it is 12 months from now and this has failed. What went wrong, why did it fail, and what could have been done differently?"},
  {id:133,ko:"가치 사슬 분석",cat:"research",en:"Map the value chain for [DESCRIBE INDUSTRY]. Where is value created, where is it captured, where are the margins, and where is disruption most likely to occur?"},
  {id:134,ko:"네트워크 효과 분석",cat:"research",en:"Analyze the network effects dynamics in [DESCRIBE MARKET OR PRODUCT]. What type of network effects exist, how strong are they, and what does this mean for competitive dynamics?"},
  {id:135,ko:"해결해야 할 과제 분석",cat:"research",en:"Apply the Jobs to Be Done framework to understand why customers hire [DESCRIBE PRODUCT OR SERVICE]. What functional, emotional, and social jobs is it doing?"},
  {id:136,ko:"경쟁 해자 분석",cat:"research",en:"Analyze the competitive moat of [COMPANY]. What sustainable advantages does it have, how durable are they, and what would erode them?"},
  {id:137,ko:"인구통계 분석",cat:"research",en:"Analyze the demographic trends affecting [DESCRIBE MARKET OR INDUSTRY]. What shifts are occurring, how fast, and what are the implications for the next 10 years?"},
  {id:138,ko:"수요와 공급 분석",cat:"research",en:"Analyze the supply and demand dynamics for [DESCRIBE MARKET]. What drives demand, what constrains supply, how tight is the market, and what would shift the balance?"},

  {id:140,ko:"가격 결정력 분석",cat:"research",en:"Analyze the pricing power of [COMPANY OR PRODUCT]. Can prices be raised without losing customers, what justifies premium pricing, and what limits pricing power?"},

// ── State ──
let activeCat = 'all';
let searchQ = '';

// ── Render ──
function highlight(text, q) {
  if (!q) return text;
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${safe})`, 'gi'), '<mark>$1</mark>');
}

function renderCards() {
  const grid = document.getElementById('promptsGrid');
  const q = searchQ.toLowerCase().trim();

  const filtered = PROMPTS.filter(p => {
    const catOk = activeCat === 'all' || p.cat === activeCat;
    if (!catOk) return false;
    if (!q) return true;
    return p.ko.toLowerCase().includes(q) || p.en.toLowerCase().includes(q);
  });

  document.getElementById('visibleCount').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><h3>검색 결과가 없습니다</h3><p>"${searchQ}"에 해당하는 프롬프트를 찾을 수 없습니다.</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const catLabel = CAT_LABELS[p.cat];
    const titleHl = highlight(p.ko, q);
    const contentHl = highlight(p.en, q);
    const num = String(p.id).padStart(3, '0');
    return `
    <article class="prompt-card" data-id="${p.id}">
      <div class="card-header">
        <span class="card-num">#${num}</span>
        <span class="card-cat">${catLabel}</span>
      </div>
      <h3 class="card-title">${titleHl}</h3>
      <p class="card-content">${contentHl}</p>
      <div class="card-footer">
        <button class="copy-btn" onclick="copyPrompt(${p.id}, this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          복사
        </button>
      </div>
    </article>`;
  }).join('');
}

// ── Copy ──
function copyPrompt(id, btn) {
  const p = PROMPTS.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.en).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 복사됨`;
    showToast();
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 복사`;
    }, 2000);
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Filter buttons ──
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  renderCards();
});

// ── Search ──
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = e.target.value;
    renderCards();
  }, 150);
});

// ── Init ──
renderCards();
</script>
